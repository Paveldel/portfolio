<!DOCTYPE html>
<html>
<head>
    <title>Search Test</title>
</head>
<body>
    <h1>Search Test</h1>
    <input type="text" id="search-input" placeholder="Type to search...">
    <div id="search-results"></div>

    <script src="https://cdn.jsdelivr.net/npm/simple-jekyll-search@1/dest/simple-jekyll-search.min.js"></script>
    <script>
        fetch('/assets/js/data/search.json')
            .then(response => response.json())
            .then(data => {
                console.log('Search data loaded:', data.length, 'posts');

                SimpleJekyllSearch({
                    searchInput: document.getElementById('search-input'),
                    resultsContainer: document.getElementById('search-results'),
                    json: '/assets/js/data/search.json',
                    searchResultTemplate: '<div><h3><a href="{url}">{title}</a></h3><p>{content}</p></div>',
                    noResultsText: 'No results found'
                });

                console.log('SimpleJekyllSearch initialized');
            })
            .catch(err => console.error('Error loading search data:', err));
    </script>
</body>
</html>
